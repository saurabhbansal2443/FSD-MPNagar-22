<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .square {
        height: 100px;
        width: 100px;
        background-color: lightblue;
        margin: 5px;
      }
      .circle {
        height: 100px;
        width: 100px;
        background-color: lightblue;
        margin: 5px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <input id="inputTag" type="text" />
    <button id="btn">Add</button>
    <select id="shapeOptions" name="" id="">
      <option value="circle">Circle</option>
      <option value="square">Square</option>
    </select>
    <div class="container">
      <!-- <div class="square"></div>
      <div class="circle"></div> -->
    </div>
  </body>
  <script>
    const inputTag = document.getElementById("inputTag");
    const buttonTag = document.getElementById("btn");
    const container = document.querySelector(".container");
    const shapeOptionsInput = document.getElementById("shapeOptions");

    buttonTag.addEventListener("click", function () {
      //   console.log("Button Clicked");
      //   console.dir(inputTag);
      const numberOfBoxes = inputTag.value;
      const shape = shapeOptionsInput.value;

      //   console.log(shape);
      //   console.log(numberOfBoxes);
      container.innerHTML = "";
      for (let i = 1; i <= numberOfBoxes; i++) {
        const box = document.createElement("div");
        box.classList.add(shape);
        //   console.log(box);
        container.appendChild(box);
      }
    });
  </script>
</html>
