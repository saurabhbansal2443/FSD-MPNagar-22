<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Position - Static , relative , absolute , fixed , sticky  */
      /* 
        Static - it is a bydefault proper which acts normal 
        Relative - 
        1) Donot leave the space 
        2) Position depends on its original location 

          absolute - 
        1)  leaves the space 
        2) intially the parent is screen , but the nearest parent which is having the property as position relative becomes its parent 

         fixed - 
        1)leaves the space 
        2) Position depends on its screen 

        Sticky -- 
        1) Donot leave the space 
        2) positon depends on parent, it maintains the minimum distance till the parent is in view 

         */
      * {
        margin: 0;
        padding: 0;
        box-sizing: 0;
      }
      .parent {
        height: 500px;
        width: 500px;
        background-color: lightblue;
        /* position: relative; */
      }
      .child {
        height: 100px;
        width: 100px;
      }
      .red {
        background-color: red;
        /* position: static; */
      }
      .blue {
        background-color: blue;
        /* position: relative;
        left: 100px;
        top: 100px; */
      }
      .green {
        background-color: green;
        /* position: absolute;
        right: 100px;
        top: 100px;  */
      }
      .black {
        background-color: black;
        /* position: fixed;
        right: 100px;
        top: 100px; */
      }
      .pink {
        background-color: lightpink;
        /* position: sticky;
        left: 100px;
        top: 100px; */
      }
      /* Pseudo Classes  */
      .pink:hover {
        background-color: lightcoral;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child red"></div>
      <div class="child blue"></div>
      <div class="child pink"></div>
      <div class="child green"></div>
      <div class="child black"></div>
    </div>
    <div style="height: 300vh; background-color: lightgreen"></div>
  </body>
</html>
