<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .parent {
        height: 100vh;
        width: 100vw;
        background-color: darkslateblue;
        display: grid;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
        grid-template-columns: repeat(4, 1fr);
        padding: 10%;
      }
      .child {
        border: 4px solid white;
      }
      .one {
        background-color: rgb(245, 126, 83);
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column-start: 1;
        grid-column-end: 3;
      }
      .two {
        background-color: rgb(46, 132, 45);
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column-start: 3;
        grid-column-end: 4;
      }
      .three {
        background-color: rgb(78, 51, 213);
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column-start: 4;
        grid-column-end: 5;
      }
      .four {
        background-color: lightpink;
      }
      .five {
        background-color: lightskyblue;
      }
      .six {
        background-color: lightcoral;
      }
      .seven {
        background-color: lightsalmon;
      }
      .eight {
        background-color: lightsteelblue;
        grid-row-start: 3;
        grid-row-end: 5;
        grid-column-start: 1;
        grid-column-end: 3;
      }
      .nine {
        background-color: lightsalmon;
      }
      .ten {
        background-color: rgb(78, 51, 213);
      }
      .eleven {
        background-color: lightcoral;
      }
      .twele {
        background-color: lightsalmon;
      }
      .thirteen {
        background-color: lightsteelblue;
        grid-row-start: 5;
        grid-row-end: 6;
        grid-column-start: 1;
        grid-column-end: 4;
      }
      .fourteen {
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child one"></div>
      <div class="child two"></div>
      <div class="child three"></div>
      <div class="child four"></div>
      <div class="child five"></div>
      <div class="child six"></div>
      <div class="child seven"></div>
      <div class="child eight"></div>
      <div class="child nine"></div>
      <div class="child ten"></div>
      <div class="child eleven"></div>
      <div class="child twele"></div>
      <div class="child thirteen"></div>
      <div class="child fourteen"></div>
    </div>
  </body>
</html>
