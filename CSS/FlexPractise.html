<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .root {
        height: 20vh;
        width: 100vw;
        /* border: 1px solid red; */
      }
      .intro {
        height: 50%;
        width: 100%;
        /* border: 1px solid red; */
        display: flex;
        justify-content: space-between;
      }
      .search {
        height: 50%;
        width: 100%;
        /* border: 1px solid red; */
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .logos {
        /* border: 1px solid red; */
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .travelText {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      input {
        height: 50%;
        width: 70%;
        margin-right: 10px;
      }
      p {
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div class="root">
      <div class="intro">
        <div class="logos">
          <button style="margin-left: 10px">Flipkart</button>
          <button style="margin-left: 10px">Travel</button>
        </div>
        <div class="travelText">
          <p>Location not set, set delivery location</p>
        </div>
      </div>
      <div class="search">
        <input type="text" />
        <p>Login</p>
        <p>Mode</p>
        <p>Cart</p>
      </div>
    </div>
  </body>
</html>
